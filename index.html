<!DOCTYPE html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>22.8</title>
    <style>
      main {
        background-color: bisque;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 1000px;
      }
      header {
        background-color: white;

        border-radius: 20px;
        text-align: center;
        font-size: 25px;
        padding: 15px;
        box-shadow: 0px 5px 3px -5px black;
        margin-bottom: 25px;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .option_title {
        text-align: center;
        width: 25%;
        font-weight: bold;
        padding: 10px;
      }
      .option_box {
        padding: 30px;
        width: 500px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      input,
      select {
        width: 150px;
        text-align: center;
        padding: 3px 0px;
        text-align-last: center;
        border: 0.5px black solid;
        border-radius: 50px;
        transition: padding 0.3s ease-in-out;
      }
      input:focus-within,
      select:focus-within {
        padding: 10px;
      }

      input:focus,
      select:focus {
        outline: none;
        border: 2px solid tomato;
      }

      .submit_btn input {
        padding: 10px;
        background-color: white;
      }

      input {
        margin: 3px 0px;
      }

      .option_tap {
        width: 300px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        transition: all 0.5s ease-in-out;
        border-radius: 10px;
      }

      .option_tap:focus-within {
        margin: 5px 0px;
        padding: 10px;
        box-shadow: 2px 1px 5px -5px black;
        background-color: white;
      }

      .option_tap div {
        width: 75%;
        display: flex;
        justify-content: flex-end;
      }
      form {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .horizon_info {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 20px 10px;
      }
      .horizon_info span {
        padding: 3px;
        font-size: 12px;
        font-weight: bold;
      }

      .hide {
        display: none;
      }

      .result_box {
        margin: 10px;
        border-radius: 20px;
        background-color: white;
        padding: 20px;
        box-shadow: 0px 3px 6px -3px black;
      }

      .result {
        display: block;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .result_info {
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .result_info span {
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="option_box">
        <header>
          <span>#22.8 스텐 셀프 견적</span>
        </header>
        <form>
          <div class="option_tap">
            <label for="type" class="option_title">표면종류</label>
            <div class="select_box">
              <select id="type">
                <option value="a">옵션을 선택해 주세요</option>
                <option value="2B">2B</option>
                <option value="HL">H/L</option>
                <option class="mir" value="Mirror">Mirror</option>
                <option class="other" value="BLK_HL">Black H/L</option>
                <option class="other" value="GOL_HL">Gold H/L</option>
                <option class="other" value="GOL_Mirror">Gold Mirror</option>
              </select>
            </div>
          </div>
          <div class="option_tap">
            <label for="thickness" class="option_title">두께</label>
            <div>
              <select required id="thickness">
                <option value="a">옵션을 선택해 주세요</option>
                <option class="mir_disabled other_disabled" value="0.8">
                  0.8 T
                </option>
                <option class="other_disabled" value="1">1 T</option>
                <option value="1.2">1.2 T</option>
                <option class="other_disabled" value="1.5">1.5 T</option>
                <option class="other_disabled" value="2">2 T</option>
              </select>
            </div>
          </div>
          <div class="option_tap">
            <label for="quantity" class="option_title">수량</label>
            <div>
              <form>
                <input
                  type="number"
                  placeholder="수량"
                  id="quantity"
                  min="1"
                  required
                />
              </form>
            </div>
          </div>
          <div class="option_tap">
            <label class="option_title" for="w_h">규격</label>
            <div>
              <form>
                <input
                  id="w_h"
                  class="calc_width"
                  required
                  placeholder="가로"
                  type="number"
                  min="10"
                  max="1219"
                />
                <input
                  class="calc_height"
                  required
                  placeholder="세로"
                  type="number"
                  min="10"
                  max="2438"
                />
              </form>
            </div>
          </div>
          <div class="option_tap horizon_info">
            <span>가로 : 10 mm ~ 1,219 mm</span>
            <span>세로 : 10 mm ~ 2,438 mm</span>
          </div>
        </form>
        <form class="submit_btn">
          <input class="submit_btn" value="계산하기" type="submit" />
        </form>
        <div class="result_box hide">
          <span class="result"></span>
          <div class="result_info">
            <span class="plate_cost"></span>
            <span> + </span>
            <span class="foundation_cost"></span>
            <span> * </span>
            <span class="result_quantity"></span>
          </div>
        </div>
      </div>
    </main>
    <script>
      // const selectedType = document.getElementById("type").options[document.getElementById("type")]
      const typeSelectBox = document.getElementById("type"),
        thickSelectBox = document.getElementById("thickness"),
        result = document.querySelector(".result"),
        resultPlate = document.querySelector(".plate_cost"),
        resultFoundation = document.querySelector(".foundation_cost"),
        resultQuantity = document.querySelector(".result_quantity"),
        submitBtn = document.querySelector(".submit_btn"),
        quantity = document.querySelector("#quantity");

      function initialOption() {
        const options = document.querySelectorAll("select > option");
        options.forEach(function (option) {
          option.classList.remove("hide");
        });
      }

      function appearResult() {
        const resultTap = document.querySelector(".result_box");
        resultTap.classList.remove("hide");
      }

      function hideOptions() {
        const mirDisabled = document.querySelector(".mir_disabled");
        const otherDisabled = document.querySelectorAll(".other_disabled");
        if (typeSelector() === "Mirror") {
          initialOption();
          mirDisabled.classList.add("hide");
        } else if (
          typeSelector() === "BLK_HL" ||
          typeSelector() === "GOL_HL" ||
          typeSelector() === "GOL_Mirror"
        ) {
          initialOption();
          otherDisabled.forEach(function (option) {
            option.classList.add("hide");
          });
        } else {
          initialOption();
        }
      }

      function unitPrice() {
        const type = typeSelector();
        const thick = thickSelector();
        if (type === "2B") {
          if (thick == 0.8) {
            return 189;
          }
          if (thick == 1) {
            return 227;
          }
          if (thick == 1.2) {
            return 267;
          }
          if (thick == 1.5) {
            return 326;
          }
          if (thick == 2) {
            return 428;
          }
        }
        if (type === "HL") {
          if (thick == 0.8) {
            return 210;
          }
          if (thick == 1) {
            return 249;
          }
          if (thick == 1.2) {
            return 293;
          }
          if (thick == 1.5) {
            return 368;
          }
          if (thick == 2) {
            return 480;
          }
        }
        if (type === "Mirror") {
          if (thick == 1) {
            return 288;
          }
          if (thick == 1.2) {
            return 335;
          }
          if (thick == 1.5) {
            return 407;
          }
          if (thick == 2) {
            return 530;
          }
        }
        if (type === "BLK_HL") {
          return 563;
        }
        if (type === "GOL_HL" || type === "GOL_Mirror") {
          return 597;
        }
      }

      function typeSelector() {
        const typeSelect = document.getElementById("type").options
          .selectedIndex;
        return typeSelectBox.options[typeSelect].value;
      }

      function thickSelector() {
        const thickSelect = document.getElementById("thickness").options
          .selectedIndex;
        return thickSelectBox.options[thickSelect].value;
      }

      function sizeCalc() {
        const widthValue = document.querySelector(".calc_width").value;
        const heightValue = document.querySelector(".calc_height").value;
        const width = Math.ceil(widthValue / 50) * 50;
        const height = Math.ceil(heightValue / 50) * 50;
        const sizeResult = (width * height) / 2500;
        return sizeResult;
      }

      function plateCost() {
        const result = sizeCalc() * unitPrice();
        const calcResult = Math.ceil(result / 100) * 100;
        if (calcResult < 1000) {
          return 1000;
        } else {
          return calcResult;
        }
      }

      function foundationCost() {
        if (plateCost() < 10000) {
          return 1000;
        } else {
          return 0;
        }
      }

      function calcCost() {
        return (plateCost() + foundationCost()) * quantity.value;
      }

      function handleChange() {
        hideOptions();
      }

      function handleSubmit(event) {
        event.preventDefault();
        appearResult();
        result.innerText = `고객님께서 선택해주신 옵션은 ${calcCost()} 원 입니다.`;
        resultPlate.innerText = `판재비 : ${plateCost()} 원`;
        resultFoundation.innerText = `재단비 : ${foundationCost()} 원`;
        resultQuantity.innerText = `${quantity.value} 개`;
      }

      function init() {
        typeSelectBox.addEventListener("change", handleChange);
        submitBtn.addEventListener("submit", handleSubmit);
      }

      init();
    </script>
  </body>
</html>
